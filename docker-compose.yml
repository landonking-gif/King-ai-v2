version: '3.8'

services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-king}:${POSTGRES_PASSWORD:-password}@postgres:5432/kingai
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app/src # Hot reload in dev

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-king}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=kingai
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port exposure — only accessible from internal docker network

  redis:
    image: redis:7
    # No host port exposure — only accessible from internal docker network

volumes:
  pgdata:
